{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-4xl font-bold mb-8 text-center text-gray-800">💰 Price List</h2>
    
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b">
                <tr>
                    <!-- These headers should match the first row in your Sheet -->
                    <th class="px-6 py-4 text-sm font-bold text-gray-600 uppercase">Service</th>
                    <th class="px-6 py-4 text-sm font-bold text-gray-600 uppercase text-right">Price (PKR)</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {% for item in prices %}
                <tr class="hover:bg-blue-50 transition">
                    <td class="px-6 py-4 font-medium text-gray-800">{{ item.Service }}</td>
                    <td class="px-6 py-4 text-right font-bold text-blue-600">{{ item.Price }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="px-6 py-12 text-center text-gray-400">
                        No prices found. Add them to your Google Sheet! 📊
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    
    <div class="mt-8 text-center">
        <p class="text-sm text-gray-400">Prices are updated live from Google Sheets.</p>
    </div>
</div>
{% endblock %}
