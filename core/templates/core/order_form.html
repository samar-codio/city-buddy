{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
    <h2 class="text-3xl font-bold mb-6 text-gray-800 border-b pb-4">📝 Place Your Order</h2>
    
    <form method="post" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <p class="text-xs text-gray-400">{{ field.help_text }}</p>
                {% endif %}
                {% for error in field.errors %}
                    <p class="text-xs text-red-500 font-medium">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform hover:-translate-y-1">
            Submit Order & Continue to Payment →
        </button>
    </form>
</div>
{% endblock %}
