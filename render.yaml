databases:
  - name: citybuddy-db
    plan: free
    databaseName: citybuddy
    user: citybuddy

services:
  - type: web
    name: citybuddy
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn citybuddy.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: citybuddy-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://citybuddy.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
